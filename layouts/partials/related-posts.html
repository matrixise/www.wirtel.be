{{ $related := .Site.RegularPages.Related . | first 3 }}
{{ with $related }}
<section class="related-posts">
    <h3>Related posts</h3>
    <ul>
        {{ range . }}
        <li>
            <a href="{{ .Permalink }}">{{ .Title }}</a>
            <span class="post-date">— {{ .Date.Format "Jan 2, 2006" }}</span>
        </li>
        {{ end }}
    </ul>
</section>
{{ end }}
