newContentEditor: /usr/bin/nvim
baseurl: https://wirtel.be/
copyright: Stéphane Wirtel
defaultContentLanguage: en
defaultContentLanguageInSubdir: true
enableRobotsTXT: true

sitemap:
  changefreq: weekly
  priority: 0.5
  filename: sitemap.xml

ignoreFiles:
  - "CLAUDE\\.md$"

languages:
  en:
    languageName: English
    weight: 1
    contentDir: content/en
    title: Stéphane Wirtel — Senior Python Consultant
    params:
      description: "Personal blog of Stéphane Wirtel — CPython Core Developer, PSF Fellow, and Python community member. Writing about Python, AI, open source, and software craftsmanship."
  fr:
    languageName: Français
    weight: 2
    contentDir: content/fr
    title: Stéphane Wirtel — Consultant Senior Python
    params:
      description: "Blog personnel de Stéphane Wirtel — CPython Core Developer, PSF Fellow et membre de la communauté Python. Articles sur Python, l'IA, l'open source et le développement logiciel."

Company:
  email: stephane.wirtel@mgx.io
  site: https://mgx.io/

Params:
  Author:
    name: Stéphane Wirtel
    email: stephane@wirtel.be
    title: Senior Python Expert
    description: "CPython Core Developer, Python Software Foundation Fellow, and Senior Python Consultant with 20+ years of experience. Specializes in Python, AI, and open source."
    knowsAbout:
      - "Python"
      - "CPython"
      - "Artificial Intelligence"
      - "Machine Learning"
      - "Open Source Software"
      - "DevOps"
      - "Software Architecture"
      - "PostgreSQL"
      - "Django"
      - "FastAPI"
      - "Blockchain"
      - "DevSecOps"
      - "Deep Learning"
      - "Golang"
      - "Linux"
      - "Distributed Systems"
  consultingURL: https://mgx.io/
  consultingEmail: stephane.wirtel@mgx.io
  twitterUsername: matrixise
  github: https://github.com/matrixise
  twitter: https://twitter.com/matrixise
  email: stephane@wirtel.be
  linkedin: https://www.linkedin.com/in/stephanewirtel/
  mainSections: [post]

Privacy:
  disqus:
    disable: true
  googleAnalytics:
    disable: false
    anonymizeIP: true
    respectDoNotTrack: true
    useSessionStorage: false

Taxonomies:
  categories: categories
  series: series
  tags: tags

related:
  threshold: 20
  includeNewer: true
  toLower: true
  indices:
    - name: tags
      weight: 100
    - name: categories
      weight: 70

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    style: dracula
    noClasses: false

module:
  imports:
    - path: github.com/nunocoracao/blowfish/v2
    - path: github.com/mfg92/hugo-shortcode-gallery
  mounts:
    - source: assets
      target: assets
