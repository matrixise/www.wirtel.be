[build]
publish = "public"
command = "npm install && hugo --gc && hugo --gc --minify && npx -y pagefind --site public --glob \"post/**/*.html\""

[build.environment]
HUGO_VERSION = "0.152.2"

[context.production.environment]
HUGO_ENV = "production"
HUGO_ENABLEGITINFO = "true"

[context.deploy-preview]
command = "npm install && hugo --gc --baseURL $DEPLOY_PRIME_URL && hugo --gc --minify --baseURL $DEPLOY_PRIME_URL && npx -y pagefind --site public --glob \"post/**/*.html\""

[context.branch-deploy]
command = "npm install && hugo --gc --baseURL $DEPLOY_PRIME_URL && hugo --gc --minify --baseURL $DEPLOY_PRIME_URL && npx -y pagefind --site public --glob \"post/**/*.html\""

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
